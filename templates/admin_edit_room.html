{% extends "base.html" %}

{% block content %}
<div class="edit-container">
    <div class="edit-header">
        <h1>✏️ Редактирование номера {{ room.number }}</h1>
        <a href="/admin" class="back-btn">← Назад в админку</a>
    </div>
    
    <form method="post" action="/admin/rooms/{{ room.id }}/update" class="edit-form">
        <div class="form-row">
            <div class="form-group">
                <label>Номер комнаты *</label>
                <input type="text" name="number" value="{{ room.number }}" required>
            </div>
            <div class="form-group">
                <label>Цена за ночь (сом.) *</label>
                <input type="number" name="price" value="{{ room.price }}" step="0.01" required>
            </div>
            <div class="form-group">
                <label>Вместимость *</label>
                <select name="capacity" required>
                    <option value="1" {% if room.capacity == 1 %}selected{% endif %}>1 гость</option>
                    <option value="2" {% if room.capacity == 2 %}selected{% endif %}>2 гостя</option>
                    <option value="3" {% if room.capacity == 3 %}selected{% endif %}>3 гостя</option>
                    <option value="4" {% if room.capacity == 4 %}selected{% endif %}>4 гостя</option>
                </select>
            </div>
        </div>
        
        <div class="form-group">
            <label>Тип номера (Таджикский) *</label>
            <input type="text" name="type_tj" value="{{ translations.tj.type_name if translations.tj else room.type }}" required>
        </div>
        <div class="form-group">
            <label>Тип номера (Русский) *</label>
            <input type="text" name="type_ru" value="{{ translations.ru.type_name if translations.ru else room.type }}" required>
        </div>
        <div class="form-group">
            <label>Тип номера (English) *</label>
            <input type="text" name="type_en" value="{{ translations.en.type_name if translations.en else room.type }}" required>
        </div>
        
        <div class="form-group">
            <label>Описание (Таджикский) *</label>
            <textarea name="description_tj" rows="3" required>{{ translations.tj.description if translations.tj else room.description }}</textarea>
        </div>
        <div class="form-group">
            <label>Описание (Русский) *</label>
            <textarea name="description_ru" rows="3" required>{{ translations.ru.description if translations.ru else room.description }}</textarea>
        </div>
        <div class="form-group">
            <label>Описание (English) *</label>
            <textarea name="description_en" rows="3" required>{{ translations.en.description if translations.en else room.description }}</textarea>
        </div>
        
        <button type="submit" class="btn-submit">💾 Сохранить изменения</button>
    </form>
</div>

<style>
.edit-container {
    max-width: 800px;
    margin: 2rem auto;
    padding: 2rem;
    background: white;
    border-radius: 20px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}
.edit-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 2px solid #e9ecef;
}
.edit-header h1 {
    margin: 0;
    color: #2c3e50;
    font-size: 1.5rem;
}
.back-btn {
    background: #6c757d;
    color: white;
    padding: 0.5rem 1rem;
    border-radius: 8px;
    text-decoration: none;
}
.form-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 1rem;
    margin-bottom: 1rem;
}
.form-group {
    display: flex;
    flex-direction: column;
    margin-bottom: 1rem;
}
.form-group label {
    margin-bottom: 0.5rem;
    font-weight: 600;
    color: #2c3e50;
}
.form-group input, .form-group select, .form-group textarea {
    padding: 0.8rem;
    border: 2px solid #e9ecef;
    border-radius: 10px;
    font-size: 1rem;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none;
    border-color: #3498db;
}
.btn-submit {
    background: linear-gradient(135deg, #27ae60, #2ecc71);
    color: white;
    border: none;
    padding: 1rem 2rem;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
    margin-top: 1rem;
}
.btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(39,174,96,0.3);
}
@media (max-width: 768px) {
    .edit-container { margin: 1rem; padding: 1rem; }
    .edit-header { flex-direction: column; gap: 1rem; text-align: center; }
}
</style>
{% endblock %}
